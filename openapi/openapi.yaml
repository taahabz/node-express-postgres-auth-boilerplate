openapi: 3.1.0
info:
  title: SkillBridge Backend API
  version: 1.0.0
  description: Authentication and health API for the backend template.
servers:
  - url: http://localhost:3000/api
paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: API is healthy
  /health/db:
    get:
      summary: Database health check
      responses:
        '200':
          description: Database is reachable
        '500':
          description: Database check failed
  /auth/signup:
    post:
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
  /auth/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
        '401':
          description: Invalid credentials
  /auth/refresh:
    post:
      summary: Rotate refresh token and issue new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid refresh token
  /auth/verify-email/otp/request:
    post:
      summary: Request verification OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEmailOtpRequest'
      responses:
        '200':
          description: OTP request accepted
  /auth/verify-email/otp/verify:
    post:
      summary: Verify user email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailOtpRequest'
      responses:
        '200':
          description: Verification successful
        '400':
          description: Invalid or expired OTP
  /auth/password/request-reset:
    post:
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset request accepted
  /auth/password/reset:
    post:
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token
  /auth/logout:
    post:
      summary: Revoke current session
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized
  /auth/password/change:
    post:
      summary: Change password for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
        '401':
          description: Unauthorized
  /auth/profile:
    get:
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RequestEmailOtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    VerifyEmailOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirmRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 12
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 12
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
