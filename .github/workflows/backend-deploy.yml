name: Backend • Deploy to EC2 (Full Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: backend-deploy-ec2
      cancel-in-progress: true
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || format('/opt/apps/{0}', github.event.repository.name) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_FINGERPRINT: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          missing=0

          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_HOST_FINGERPRINT; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false

      - name: Upload app source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          target: ${{ env.DEPLOY_PATH }}
          source: Dockerfile,package.json,package-lock.json,tsconfig.json,prisma,openapi,src,docker-compose.yml

      - name: Sync database and deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -f .env ]; then
              echo "Missing .env in $DEPLOY_PATH"
              exit 1
            fi

            required_vars="DATABASE_URL DIRECT_URL JWT_SECRET JWT_REFRESH_SECRET REDIS_URL CORS_ORIGIN"
            for var in $required_vars; do
              if ! grep -Eq "^${var}=.+" .env; then
                echo "Missing or empty required env var: $var"
                exit 1
              fi
            done

            docker build --target builder -t backend-workflow-builder .
            docker run --rm --env-file .env backend-workflow-builder npm run prisma:migrate:deploy
            docker run --rm --env-file .env backend-workflow-builder npm run prisma:push
            docker compose up -d --build --remove-orphans
            docker compose ps

            docker image prune -f

      - name: Check health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail
            curl -fsS http://localhost:3000/api/health
