services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skillbridge-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: skillbridge-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "900 1 300 10 60 10000",
        "--requirepass",
        "${REDIS_PASSWORD:-redis_dev_password}"
      ]
    stop_grace_period: 1m
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
